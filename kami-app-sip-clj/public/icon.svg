<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Spirit in Physics">
  <!-- maskable: full-bleed background, motif within the safe center -->
  <rect width="512" height="512" fill="#efe9fb"/>
  <rect width="512" height="512" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#fbf7ff"/>
      <stop offset="60%" stop-color="#efe9fb"/>
      <stop offset="100%" stop-color="#e7eef7"/>
    </radialGradient>
  </defs>
  <!-- water drop -->
  <path d="M256 120 C 322 214, 356 270, 356 318 a100 100 0 1 1 -200 0 C 156 270, 190 214, 256 120 Z"
        fill="#c9bbe6" opacity="0.55"/>
  <!-- heartbeat (心音) line across the drop -->
  <path d="M150 330 H214 L236 286 L268 360 L292 322 H362"
        fill="none" stroke="#6b5b95" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="362" cy="322" r="10" fill="#e58fb0"/>
</svg>

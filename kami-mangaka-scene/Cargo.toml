[package]
name = "kami-mangaka-scene"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Mangaka headless 3D scene composition facade (kami-vrm + kami-scene-graph + kami-render + kami-postfx). Driven by lg_mangaka.compose_scene_3d Pregel graph. ADR-2605141200."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
# Optional DEC physics (wind / dust / Maxwell) for outdoor scenes.
sim-dec = ["dep:kami-dec"]
# PyO3 bindings, enabled for the LangGraph pod build via maturin.
python = ["dep:pyo3"]

[dependencies]
kami-core        = { path = "../kami-core" }
kami-scene-graph = { path = "../kami-scene-graph" }
kami-skeleton    = { path = "../kami-skeleton" }
kami-vrm         = { path = "../kami-vrm" }
kami-gltf        = { path = "../kami-gltf" }
kami-terrain     = { path = "../kami-terrain" }
kami-atmosphere  = { path = "../kami-atmosphere" }
kami-render      = { path = "../kami-render" }
kami-postfx      = { path = "../kami-postfx" }
kami-pipelines   = { path = "../kami-pipelines" }
kami-app         = { path = "../kami-app" }
kami-dec         = { path = "../kami-dec", optional = true }

hecs        = { workspace = true }
glam        = { workspace = true }
bitflags    = { workspace = true }
bytemuck    = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
log         = { workspace = true }
wgpu        = "24"

pyo3 = { version = "0.22", optional = true, features = ["extension-module"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
png      = "0.17"
pollster = "0.4"

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-bindgen             = { workspace = true }
wasm-bindgen-futures     = "0.4"
js-sys                   = "0.3"
web-sys                  = { version = "0.3", features = [
    "Document", "Window", "HtmlCanvasElement", "Element",
    "console", "Performance",
] }
console_error_panic_hook = "0.1"
console_log              = "1"

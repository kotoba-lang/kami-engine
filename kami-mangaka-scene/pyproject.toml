[build-system]
requires = [
    "maturin>=1.7",
]
build-backend = "maturin"

[project]
name = "kami-mangaka-scene"
version = "0.1.0"
description = "Headless 3D scene composition for mangaka.gftd.ai — PyO3 wheel"
requires-python = ">=3.11"
authors = [
    { name = "Gftd Japan" },
]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
]

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "pyright>=1.1.300",
]

[tool.maturin]
features = [
    "python",
]
module-name = "kami_mangaka_scene"
strip = true
include = []
exclude = [
    "tests/**",
    "**/*.wgsl.bak",
]

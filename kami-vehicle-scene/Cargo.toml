[package]
name = "kami-vehicle-scene"
version.workspace = true
edition.workspace = true
license.workspace = true

# kami-vehicle-scene — data-tier authoring surface for kami-vehicle ground CONFIG.
#
# ADR-0038: hot physics stays native Rust (kami-vehicle); only init-time
# CONFIG/DATA moves to EDN. This sibling-of-kami-live crate turns canonical
# `:ground/*` EDN (the surface grip table + the demo-circuit zone map) into the
# real `kami_vehicle` engine structs, re-using the tolerant `kami-scene` EDN
# accessors exactly the way games parse `scene.edn`.
#
# kami-vehicle stays "pure Rust + glam + serde, no edn dep" — the EDN dependency
# lives only here. The compiled-in `SurfaceKind` enum + `MapGround::demo_circuit`
# remain the `builtin()` fallback and are parity-tested against the shipped EDN.

[dependencies]
# Engine structs we build (SurfaceKind / MapGround / SurfaceZone). Path dep, no
# new feature added to kami-vehicle — this is additive.
kami-vehicle = { path = "../kami-vehicle" }
# EDN ground-config authoring (clj/edn → SurfaceTable / MapGround). Re-uses the
# tolerant scene.edn accessors so ground config parses the same way games do.
kami-scene = { path = "../kami-scene" }
thiserror = { workspace = true }

[package]
name = "kami-knp"
version.workspace = true
edition.workspace = true

[dependencies]
kami-core = { path = "../kami-core" }
log = { workspace = true }
thiserror = { workspace = true }
ring = { workspace = true }
bitflags = { workspace = true }
bytemuck = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["WebTransport", "WebTransportDatagramDuplexStream", "WritableStream", "WritableStreamDefaultWriter", "ReadableStream", "ReadableStreamDefaultReader"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

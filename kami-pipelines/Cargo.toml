[package]
name = "kami-pipelines"
version.workspace = true
edition.workspace = true
license.workspace = true

# Shared `RenderPipeline` adapters for kami-app games.
#
# This crate wraps low-level `kami-render` pipelines (Sky, Terrain,
# Vegetation, Character) and content generators (`kami-terrain`,
# `kami-vegetation`) into `RenderPipeline` trait impls that any
# `kami-app-{game}` crate can compose via the builder API.
#
# Ownership: game crates depend on kami-pipelines for reusable ground /
# sky / plants. Game-specific pipelines (e.g. voxel sandbox, SDF
# characters, particle systems) stay in their own game crate.

[dependencies]
kami-app = { path = "../kami-app" }
kami-render = { path = "../kami-render" }
kami-terrain = { path = "../kami-terrain" }
kami-vegetation = { path = "../kami-vegetation" }
kami-dec = { path = "../kami-dec" }
kami-bim = { path = "../kami-bim" }
glam = { workspace = true }
hecs = { workspace = true }
bytemuck = { workspace = true }
wgpu = "24"

[package]
name = "kami-postfx-scene"
version.workspace = true
edition.workspace = true
license.workspace = true

# kami-postfx-scene — data-tier authoring surface for kami-postfx
# POST-PROCESSING PIPELINE presets.
#
# ADR-0038: hot fullscreen passes / GPU uniform packing stay native Rust
# (kami-postfx); only init-time CONFIG/DATA moves to EDN. This
# sibling-of-kami-vehicle-scene / kami-atmosphere-scene / kami-terrain-scene /
# kami-vegetation-scene crate turns canonical `:postfx/presets` EDN (an ordered
# vector of `:effect`-tagged effect maps per preset) into the real
# `kami_postfx::PostFxPipeline` engine struct (rebuilt via new()+add in order),
# re-using the tolerant `kami-scene` EDN accessors exactly the way games parse
# `scene.edn`.
#
# kami-postfx stays untouched — the EDN dependency lives only here. The
# compiled-in `PostFxPipeline::{nintendo,retro,final_fantasy,baminiku_character}()`
# preset builders remain the `builtin_preset()` fallback and parity oracle, and
# are parity-tested against the shipped EDN.

[dependencies]
# Engine struct we build (PostFxPipeline + PostEffect). Path dep, no new feature
# added to kami-postfx — this is additive.
kami-postfx = { path = "../kami-postfx" }
# EDN preset-config authoring (clj/edn → EffectSpec). Re-uses the tolerant
# scene.edn accessors so preset config parses the same way games do.
kami-scene = { path = "../kami-scene" }
thiserror = { workspace = true }

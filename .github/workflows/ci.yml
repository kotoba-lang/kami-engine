name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  parity:
    name: WIT single-source + no-rust guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { bb: 'latest' }
      - name: WIT interface — EDN IDL == world.wit == kami-clj Builtin map
        run: bb wit-check
      - name: ensure Rust runtime files stay out
        run: |
          if find . \
            \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) \
            -print -quit | grep -q .; then
            find . \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) -print
            exit 1
          fi

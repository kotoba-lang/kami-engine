[package]
name = "kami-os"
version.workspace = true
edition.workspace = true
description = "KAMI OS compositor — wgpu window manager, taskbar, launcher, notifications"

[dependencies]
kami-core = { path = "../kami-core" }
kami-render = { path = "../kami-render" }
kami-input = { path = "../kami-input" }
kami-ui-gpu = { path = "../kami-ui-gpu" }
kami-text = { path = "../kami-text" }
kami-knp = { path = "../kami-knp" }
kami-bridge = { path = "../kami-bridge" }
glam.workspace = true
bytemuck.workspace = true
hecs.workspace = true
log.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlCanvasElement",
    "Performance", "KeyboardEvent", "MouseEvent", "WheelEvent",
    "PointerEvent", "TouchEvent",
] }
js-sys = "0.3"

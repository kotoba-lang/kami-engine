[package]
name = "kami-script-runtime"
version.workspace = true
edition.workspace = true
description = "kami-script-runtime — WASM host (wasmtime JIT or wasmi no-JIT) that binds kami:engine/* imports to live Rust game-engine state. Loads kototama-compiled WASM modules (the single Clojure→WASM toolchain) and drives init/tick/on-event lifecycle."

[dependencies]
# Compiler comes through kototama (the one Clojure→WASM runtime), not directly from
# kami-engine-clj — single compiler entry point for native + web.
kototama = { path = "../../kototama", default-features = false }
kami-core = { path = "../kami-core" }
kami-input = { path = "../kami-input" }
kami-audio = { path = "../kami-audio" }
# Two WASM execution backends, one host-binding codebase (see src/lib.rs).
#   wasmtime — JIT, fastest. macOS / Linux / Windows / Android (where W^X is not enforced).
#   wasmi    — pure interpreter, NO codegen → iOS / PS5 / Switch (JIT forbidden) + Android fallback.
# The guest ABI is the all-i64 deterministic model, so both produce bit-identical runs
# (lockstep co-op / replay / headless golden-frame CI hold across backends). ADR-0037.
wasmtime   = { workspace = true, optional = true }
wasmi      = { version = "1", optional = true, default-features = false, features = ["std"] }
hecs       = { workspace = true }
thiserror  = { workspace = true }
log        = { workspace = true }

[features]
default          = ["backend-wasmtime"]
backend-wasmtime = ["dep:wasmtime"]
# Build the no-JIT host:  cargo check-native -p kami-script-runtime \
#                           --no-default-features --features backend-wasmi
backend-wasmi    = ["dep:wasmi"]

[dev-dependencies]
hecs = { workspace = true }
# Model-B composition test (tests/dance_model_b.rs): drive kami-live's native
# LiveShow + the compiled-CLJ dance logic in one host loop. Test-only, no cycle.
kami-live = { path = "../kami-live" }
# Parse the EDN that `kami spec` emits, to round-trip-test the bb-pipeline contract.
kami-scene = { path = "../kami-scene" }
# Headless frame-pipeline example (examples/frame_pipeline.rs): the host drives the
# demo game and feeds the RT compute (kami-render/kami-rt) + binaural WAV (kami-audio)
# executors. GPU example only — needs an adapter (skips otherwise).
kami-render = { path = "../kami-render" }
kami-rt = { path = "../kami-rt" }
glam = { workspace = true }
pollster = "0.4"
wgpu = "24"
bytemuck = { workspace = true }

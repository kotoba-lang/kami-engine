[package]
name = "kami-script-runtime"
version.workspace = true
edition.workspace = true
description = "kami-script-runtime — WASM host (wasmtime JIT or wasmi no-JIT) that binds kami:engine/* imports to live Rust game-engine state. Loads compiled kami-engine-clj WASM modules and drives init/tick/on-event lifecycle."

[dependencies]
kami-engine-clj = { path = "../kami-engine-clj" }
kami-core = { path = "../kami-core" }
kami-input = { path = "../kami-input" }
kami-audio = { path = "../kami-audio" }
# Two WASM execution backends, one host-binding codebase (see src/lib.rs).
#   wasmtime — JIT, fastest. macOS / Linux / Windows / Android (where W^X is not enforced).
#   wasmi    — pure interpreter, NO codegen → iOS / PS5 / Switch (JIT forbidden) + Android fallback.
# The guest ABI is the all-i64 deterministic model, so both produce bit-identical runs
# (lockstep co-op / replay / headless golden-frame CI hold across backends). ADR-0037.
wasmtime   = { workspace = true, optional = true }
wasmi      = { version = "1", optional = true, default-features = false, features = ["std"] }
hecs       = { workspace = true }
thiserror  = { workspace = true }
log        = { workspace = true }

[features]
default          = ["backend-wasmtime"]
backend-wasmtime = ["dep:wasmtime"]
# Build the no-JIT host:  cargo check-native -p kami-script-runtime \
#                           --no-default-features --features backend-wasmi
backend-wasmi    = ["dep:wasmi"]

[dev-dependencies]
hecs = { workspace = true }
# Parse the EDN that `kami spec` emits, to round-trip-test the bb-pipeline contract.
kami-scene = { path = "../kami-scene" }

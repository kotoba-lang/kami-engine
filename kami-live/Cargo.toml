[package]
name = "kami-live"
version.workspace = true
edition.workspace = true
license.workspace = true

# kami-live — Live music venue SDK for KAMI Engine.
#
# Pure-Rust domain layer that composes engine primitives (audio, postfx,
# atlas-vis, particle, character) into a virtual concert experience:
#   - BeatGrid (BPM, bar, phrase, swing)
#   - Setlist (track schedule, cue points)
#   - LightingCue (par / spot / strobe / laser, beat-synced)
#   - Stage (truss / risers / LED wall geometry)
#   - Crowd (fan agents with reactive jump/clap/lightstick)
#   - VJDeck (visual track palette)
#   - Performer (dance avatar driver + dance pose timeline)
#
# No GPU deps. Game crate `kami-app-live` consumes this and renders.

[dependencies]
glam = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
log = { workspace = true }
# EDN dance-scene authoring (clj/edn → LiveShow). Re-uses the tolerant
# scene.edn accessors so the dance scene parses the same way games do.
kami-scene = { path = "../kami-scene" }
# EDN writer: project a ShowSnapshot → the render-IR EDN the native
# (kami-webgpu-rs) + web (CLJS) renderers already consume (ADR-0041).
kotoba-edn = { path = "../../kotoba/crates/kotoba-edn" }

[dev-dependencies]
# Cross-crate integration test: realise the EDN render-IR into the domain
# structs each crate owns (ADR-0044/0045) — proves the data→realizer pipeline.
kami-webgpu-rs = { path = "../kami-webgpu-rs" }
kami-skeleton-scene = { path = "../kami-skeleton-scene" }
kami-postfx-scene = { path = "../kami-postfx-scene" }
kami-postfx = { path = "../kami-postfx" }
kami-vrm = { path = "../kami-vrm" }
# Offscreen PNG rendering of the dance scene (see the choreography rendered).
image = { version = "0.25", default-features = false, features = ["png", "gif", "jpeg"] }
wgpu = "24"
pollster = "0.4"
bytemuck = { workspace = true }

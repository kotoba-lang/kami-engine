[package]
name = "kami-render"
version.workspace = true
edition.workspace = true

[features]
default = ["wgpu-backend"]
wgpu-backend = ["dep:wgpu"]
ash-backend = ["dep:ash", "dep:gpu-allocator"]
gltf-loader = ["dep:gltf", "dep:serde_json"]
gaussian-splat = ["wgpu-backend"]

[dependencies]
kami-core = { path = "../kami-core" }
glam = { workspace = true }
bytemuck = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }

wgpu = { version = "24", optional = true }
ash = { version = "0.38", optional = true }
gpu-allocator = { version = "0.27", optional = true, features = ["vulkan"] }
gltf = { version = "1", optional = true }
serde_json = { version = "1", optional = true }

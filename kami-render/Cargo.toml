[package]
name = "kami-render"
version.workspace = true
edition.workspace = true

[features]
default = ["wgpu-backend"]
wgpu-backend = ["dep:wgpu"]
ash-backend = ["dep:ash", "dep:gpu-allocator"]
gltf-loader = ["dep:gltf", "dep:serde_json", "dep:image"]
gaussian-splat = ["wgpu-backend"]

[dependencies]
kami-core = { path = "../kami-core" }
glam = { workspace = true }
bytemuck = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }

wgpu = { version = "24", optional = true }
ash = { version = "0.38", optional = true }
gpu-allocator = { version = "0.27", optional = true, features = ["vulkan"] }
gltf = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

# Pure-Rust gzip (miniz_oxide backend) — wasm-safe. Used by the SPZ splat loader
# (always on) and KTX2 ZLIB supercompression.
flate2 = { workspace = true }

# PNG/JPEG decode for glTF embedded images (KTX2/basisu handled in-crate).
image = { workspace = true, optional = true }

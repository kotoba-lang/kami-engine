[package]
name = "kami-input-scene"
version.workspace = true
edition.workspace = true
license.workspace = true

# kami-input-scene — data-tier authoring surface for kami-input's default
# input-binding maps (ADR-0040 "input: device→action maps").
#
# ADR-0038: hot per-frame input resolution stays native Rust (kami-input);
# only the init-time CONFIG — the default device→action binding tables — moves
# to EDN. This sibling-of-kami-vehicle-scene / kami-character-scene crate turns
# canonical `:input/maps` EDN (ordered tables of `[key-code action]` pairs) into
# the real `kami_input::InputMap` engine struct, re-using the tolerant
# `kami-scene` EDN accessors exactly the way games parse `scene.edn`.
#
# kami-input stays untouched — the EDN dependency lives only here. The compiled-in
# `InputMap::{default_fps,default_graph}()` preset builders remain the
# `builtin_input_map()` fallback and parity oracle, and are parity-tested against
# the shipped EDN.

[dependencies]
# Engine struct we build (InputMap / Action). Path dep, no new feature added to
# kami-input — this is additive.
kami-input = { path = "../kami-input" }
# EDN preset-config authoring (clj/edn → InputMap). Re-uses the tolerant
# scene.edn accessors so binding config parses the same way games do.
kami-scene = { path = "../kami-scene" }
thiserror = { workspace = true }

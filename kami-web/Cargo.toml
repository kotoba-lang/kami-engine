[package]
name = "kami-web"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
kami-core = { path = "../kami-core" }
kami-render = { path = "../kami-render", features = ["wgpu-backend", "gltf-loader"] }
kami-game = { path = "../kami-game" }
kami-scad = { path = "../kami-scad" }
kami-sdf = { path = "../kami-sdf" }
kami-nerf = { path = "../kami-nerf" }
kami-voxel = { path = "../kami-voxel" }
kami-mesher = { path = "../kami-mesher" }
kami-graph = { path = "../kami-graph" }
kami-character = { path = "../kami-character" }
kami-skeleton = { path = "../kami-skeleton" }
kami-vrm = { path = "../kami-vrm" }
kami-rtc = { path = "../kami-rtc" }
kami-ui-gpu = { path = "../kami-ui-gpu" }
kami-text = { path = "../kami-text" }
kami-terrain = { path = "../kami-terrain" }
kami-atmosphere = { path = "../kami-atmosphere" }
# Executor edge (ADR-0044/0046): weather presets load from weather.edn, builtin fallback.
kami-atmosphere-scene = { path = "../kami-atmosphere-scene" }
kami-vegetation = { path = "../kami-vegetation" }
glam = { workspace = true }
bytemuck = { workspace = true }
log = { workspace = true }
wgpu = "24"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window", "Document", "HtmlCanvasElement", "Element",
    "Navigator",
    "console", "Performance",
    "KeyboardEvent", "MouseEvent", "PointerEvent", "EventTarget",
    "TouchEvent", "TouchList", "Touch",
    "WheelEvent", "AddEventListenerOptions",
    "Response", "Headers", "Request", "RequestInit",
] }
js-sys = "0.3"
console_log = "1"
console_error_panic_hook = "0.1"
serde = { workspace = true }
serde_json = { workspace = true }

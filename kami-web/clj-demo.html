<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>kami-clj browser demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ead6; font-family: 'Courier New', monospace; padding: 24px; }
  h1 { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #333; }
  .layout { display: flex; gap: 20px; align-items: flex-start; }
  canvas { border: 3px solid #aaa; border-radius: 8px; background: #1a1a2e;
           display: block; image-rendering: pixelated; }
  .panel { background: white; border-radius: 8px; border: 2px solid #ccc;
           padding: 12px; min-width: 220px; }
  .panel h2 { font-size: 13px; font-weight: bold; margin-bottom: 8px;
              text-transform: uppercase; color: #555; letter-spacing: 1px; }
  .log { font-size: 12px; height: 120px; overflow-y: auto;
         background: #111; color: #0f0; padding: 6px; border-radius: 4px; }
  .log div { margin-bottom: 2px; }
  .keys { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .key { background: #eee; border: 2px solid #bbb; border-radius: 4px;
         padding: 4px 8px; font-size: 12px; font-weight: bold; color: #333;
         transition: background 0.1s, border-color 0.1s; }
  .key.active { background: #ffdd00; border-color: #cc8800; color: #333; }
  .stat { font-size: 12px; margin-bottom: 4px; color: #444; }
  .stat span { font-weight: bold; color: #222; }
  .hint { font-size: 11px; color: #888; margin-top: 8px; }
  #status { font-size: 13px; margin-bottom: 12px; padding: 6px 10px;
            border-radius: 4px; background: #fff3cd; border: 1px solid #ffc107; }
  #status.ok { background: #d4edda; border-color: #28a745; }
  #status.err { background: #f8d7da; border-color: #dc3545; }
</style>
</head>
<body>
<h1>kami-clj Browser Demo — Clojure → WASM → wasmtime ライクなJS ホスト</h1>
<div id="status">⏳ demo.wasm をロード中...</div>

<div class="layout">
  <canvas id="c" width="480" height="320"></canvas>

  <div style="display:flex;flex-direction:column;gap:12px">

    <div class="panel">
      <h2>Keys</h2>
      <div class="keys">
        <div class="key" id="k-ArrowLeft">← Left</div>
        <div class="key" id="k-ArrowRight">Right →</div>
        <div class="key" id="k-Space">Space</div>
      </div>
      <div class="hint">矢印キーでプレイヤーを移動、Spaceでジャンプ音</div>
    </div>

    <div class="panel">
      <h2>Stats</h2>
      <div class="stat">delta_ms: <span id="s-dt">-</span></div>
      <div class="stat">tick #: <span id="s-tick">0</span></div>
      <div class="stat">draw calls: <span id="s-draw">0</span></div>
      <div class="stat">entity pos: <span id="s-pos">-</span></div>
    </div>

    <div class="panel" style="flex:1">
      <h2>Audio Log</h2>
      <div class="log" id="audio-log"></div>
    </div>

  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Host state
// ---------------------------------------------------------------------------
let memory = null;
let keysDown = new Set();
let entities = new Map();   // id(Number) → {x,y,z}
let tickCount = 0;
let lastTime = 0;
let deltaMs = 16;
const MAX_LOG = 80;

// Simple bounce physics in the JS host (since ECS lives here)
// entity spawned at x=0, moving at vx=2 px/frame
let playerX = 0;
let playerVx = 2.0;
let audioLog = document.getElementById('audio-log');
let statusEl = document.getElementById('status');

function readString(ptr, len) {
  const bytes = new Uint8Array(memory.buffer, ptr, len);
  return new TextDecoder().decode(bytes);
}

function logAudio(name) {
  if (audioLog.children.length > MAX_LOG)
    audioLog.removeChild(audioLog.firstChild);
  const d = document.createElement('div');
  d.textContent = `[${tickCount}] ♪ ${name}`;
  audioLog.appendChild(d);
  audioLog.scrollTop = audioLog.scrollHeight;
}

// ---------------------------------------------------------------------------
// WASM imports — must match kami-clj codegen exactly
// (i64 ↔ BigInt, f32/i32 ↔ Number)
// ---------------------------------------------------------------------------
const imports = {
  // ---- scene ---------------------------------------------------------------
  "kami:engine/scene@1.0.0": {
    "spawn": (ptr, len) => {
      // ptr/len: i32; returns i64 (BigInt)
      const name = readString(ptr, len);
      const id = entities.size + 1;
      entities.set(id, { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0 });
      console.log(`spawn("${name}") → id=${id}`);
      return BigInt(id);
    },
    "despawn": (_eid) => {},
    "get-x": (eid) => {
      const e = entities.get(Number(eid));
      return e ? e.x : 0.0;
    },
    "get-y": (eid) => {
      const e = entities.get(Number(eid));
      return e ? e.y : 0.0;
    },
    "get-z": (eid) => {
      const e = entities.get(Number(eid));
      return e ? e.z : 0.0;
    },
    "set-position": (eid, x, y, z) => {
      const e = entities.get(Number(eid));
      if (e) { e.x = x; e.y = y; e.z = z; }
    },
    "get-vx": (eid) => { const e = entities.get(Number(eid)); return e ? e.vx : 0.0; },
    "get-vy": (eid) => { const e = entities.get(Number(eid)); return e ? e.vy : 0.0; },
    "get-vz": (eid) => { const e = entities.get(Number(eid)); return e ? e.vz : 0.0; },
    "set-velocity": (eid, vx, vy, vz) => {
      const e = entities.get(Number(eid));
      if (e) { e.vx = vx; e.vy = vy; e.vz = vz; }
    },
    "get-rx": (_eid) => 0.0,
    "get-ry": (_eid) => 0.0,
    "get-rz": (_eid) => 0.0,
    "get-rw": (_eid) => 1.0,
    "set-rotation": (_eid, _rx, _ry, _rz, _rw) => {},
  },

  // ---- physics (stub) -----------------------------------------------------
  "kami:engine/physics@1.0.0": {
    "apply-impulse": (_eid, _ix, _iy, _iz) => {},
    "apply-force":   (_eid, _fx, _fy, _fz) => {},
    "raycast":       (_ox, _oy, _oz, _dx, _dy, _dz) => BigInt(0),
  },

  // ---- input ---------------------------------------------------------------
  "kami:engine/input@1.0.0": {
    "key-down": (ptr, len) => {
      // ptr/len: i32; returns i32
      const key = readString(ptr, len);
      return keysDown.has(key) ? 1 : 0;
    },
    "key-pressed": (ptr, len) => {
      const key = readString(ptr, len);
      return keysDown.has(key) ? 1 : 0;
    },
    "axis": (ptr, len) => 0.0,
    "pointer-x": () => 0.0,
    "pointer-y": () => 0.0,
  },

  // ---- render --------------------------------------------------------------
  "kami:engine/render@1.0.0": {
    "draw-mesh": (ptr, len, x, y, z) => {
      // ptr/len: i32; x/y/z: f32; no return
      const mesh = readString(ptr, len);
      drawCalls.push({ mesh, x, y, z });
    },
    "spawn-particle": (ptr, len, x, y, z) => {},
    "draw-line": (x0, y0, z0, x1, y1, z1, _color) => {},
  },

  // ---- audio ---------------------------------------------------------------
  "kami:engine/audio@1.0.0": {
    "play": (ptr, len) => {
      // ptr/len: i32; no return
      const name = readString(ptr, len);
      logAudio(name);
    },
    "stop": (ptr, len) => {},
    "play-at": (ptr, len, x, y, z) => {
      const name = readString(ptr, len);
      logAudio(`${name} @(${x.toFixed(1)},${y.toFixed(1)},${z.toFixed(1)})`);
    },
  },

  // ---- time ----------------------------------------------------------------
  "kami:engine/time@1.0.0": {
    "delta-ms":   () => BigInt(deltaMs),          // returns i64
    "elapsed-ms": () => BigInt(Math.round(performance.now())),
    "tick":       () => BigInt(tickCount),
  },
};

// ---------------------------------------------------------------------------
// Canvas renderer
// ---------------------------------------------------------------------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let drawCalls = [];

const W = canvas.width;
const H = canvas.height;
const HALF_W = W / 2;
const HALF_H = H / 2;

function renderFrame() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#1f2045';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Player (driven by JS physics + ECS data from script)
  // Autonomous bounce simulation in JS host
  if (keysDown.has('ArrowRight')) playerVx = Math.min(playerVx + 0.3, 5);
  if (keysDown.has('ArrowLeft'))  playerVx = Math.max(playerVx - 0.3, -5);
  playerX += playerVx * (deltaMs / 16);
  if (playerX >  200) { playerX =  200; playerVx *= -1; }
  if (playerX < -200) { playerX = -200; playerVx *= -1; }

  const px = HALF_W + playerX;
  const py = HALF_H;

  // Draw calls from the WASM script (draw-mesh! invocations)
  for (const dc of drawCalls) {
    ctx.fillStyle = '#4ecca3';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#4ecca3';
    // player mesh → square at script-reported position (offset by playerX for demo)
    ctx.fillRect(px - 14, py - 14, 28, 28);
    ctx.shadowBlur = 0;
  }
  drawCalls = [];

  // Wall markers
  ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(HALF_W - 200, 0); ctx.lineTo(HALF_W - 200, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HALF_W + 200, 0); ctx.lineTo(HALF_W + 200, H); ctx.stroke();

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText(`pos x=${playerX.toFixed(1)}  vx=${playerVx.toFixed(2)}`, 8, H - 8);
}

// ---------------------------------------------------------------------------
// RAF loop
// ---------------------------------------------------------------------------
let wasmInstance = null;
let initDone = false;

function raf(ts) {
  deltaMs = lastTime === 0 ? 16 : Math.round(ts - lastTime);
  lastTime = ts;
  tickCount++;

  try {
    if (!initDone) {
      wasmInstance.exports.init();
      initDone = true;
    }
    wasmInstance.exports.tick(BigInt(deltaMs));
  } catch (e) {
    statusEl.textContent = `❌ WASM trap: ${e.message}`;
    statusEl.className = 'err';
    return; // stop loop on error
  }

  renderFrame();

  // Update stats
  document.getElementById('s-dt').textContent = deltaMs + ' ms';
  document.getElementById('s-tick').textContent = tickCount;
  document.getElementById('s-draw').textContent = tickCount; // 1 draw-mesh per tick
  document.getElementById('s-pos').textContent = `x=${playerX.toFixed(1)}`;

  // Key highlight
  ['ArrowLeft','ArrowRight','Space'].forEach(k => {
    document.getElementById('k-' + k).classList.toggle('active', keysDown.has(k));
  });

  requestAnimationFrame(raf);
}

// ---------------------------------------------------------------------------
// Keyboard input
// ---------------------------------------------------------------------------
window.addEventListener('keydown', e => { keysDown.add(e.code); e.preventDefault(); });
window.addEventListener('keyup',   e => { keysDown.delete(e.code); });

// ---------------------------------------------------------------------------
// Load WASM
// ---------------------------------------------------------------------------
(async () => {
  try {
    const resp = await fetch('clj-demo.wasm');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.url}`);
    const bytes = await resp.arrayBuffer();
    const { instance } = await WebAssembly.instantiate(bytes, imports);
    wasmInstance = instance;
    memory = instance.exports.memory;

    statusEl.textContent = '✅ demo.wasm ロード成功 — Clojure→WASM→JSホスト 動作中';
    statusEl.className = 'ok';

    requestAnimationFrame(raf);
  } catch (e) {
    statusEl.textContent = `❌ ${e.message}`;
    statusEl.className = 'err';
    console.error(e);
  }
})();
</script>
</body>
</html>

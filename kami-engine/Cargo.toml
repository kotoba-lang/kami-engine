[package]
name = "kami-engine"
version.workspace = true
edition.workspace = true

[features]
default = ["wgpu-backend"]
wgpu-backend = ["kami-render/wgpu-backend"]
ash-backend = ["kami-render/ash-backend"]

[dependencies]
kami-core = { path = "../kami-core" }
kami-knp = { path = "../kami-knp" }
kami-render = { path = "../kami-render" }
kami-rtc = { path = "../kami-rtc", features = ["knp"] }
kami-mine-pds = { path = "../kami-mine-pds" }
kami-mine-ai = { path = "../kami-mine-ai" }
hecs = { workspace = true }
glam = { workspace = true }
bytemuck = { workspace = true }
log = { workspace = true }

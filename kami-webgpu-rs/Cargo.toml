[package]
name = "kami-webgpu-rs"
version.workspace = true
edition.workspace = true
description = "kami-webgpu-rs — native Rust/wgpu executor for the kami-webgpu EDN render-IR. The same EDN the web (CLJS→WebGPU) renders, interpreted natively (ADR-0001/0040). Headless render + pixel readback = golden-frame verification, no window."

[dependencies]
wgpu        = "24"
glam        = { workspace = true }
bytemuck    = { workspace = true }
pollster    = "0.4"
kami-scene  = { path = "../kami-scene" }
kotoba-edn  = { path = "../../kotoba/crates/kotoba-edn" }
